name: test formula

on:
  push:
    branches: [main]
  workflow_dispatch:

# All actions pinned to a full commit SHA (not a moving tag) for supply-chain safety.
# Push CI tests main HEAD (the tap is fetched from GitHub) on both macOS and Linux.
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # main @ 2026-05
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tap, audit, install, and test the formula
        run: |
          brew tap carlkibler/tap
          brew audit --strict carlkibler/tap/toolsmith
          brew install carlkibler/tap/toolsmith
          brew test carlkibler/tap/toolsmith
